<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>
<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: #fafafa;
  color: #333;
}

/* ヘッダー */
header {
  text-align: center;
  padding: 60px 20px 30px;
}
header h1 {
  font-size: 32px;
  margin-bottom: 10px;
}
header p {
  color: #777;
}

/* グリッド */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 40px;
}

/* カード */
.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  transform: translateY(20px);
  opacity: 0;
  animation: fadeUp 0.8s ease forwards;
}

.card img {
  width: 100%;
  display: block;
}

.card p {
  padding: 15px;
  font-size: 14px;
}

/* ふわっと表示 */
@keyframes fadeUp {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* ボタン */
.cta {
  text-align: center;
  padding: 60px 20px;
}

.cta a {
  background: #111;
  color: #fff;
  padding: 14px 28px;
  border-radius: 30px;
  text-decoration: none;
  transition: 0.3s;
}

.cta a:hover {
  background: #555;
}
</style>
</head>

<body>

<header>
  <h1>Illustration Portfolio</h1>
  <p>やわらかく、心に残るイラストを描いています</p>
</header>

<section class="gallery">
  <div class="card"><img src="https://via.placeholder.com/400x300"><p>作品タイトル</p></div>
  <div class="card"><img src="https://via.placeholder.com/400x300"><p>作品タイトル</p></div>
  <div class="card"><img src="https://via.placeholder.com/400x300"><p>作品タイトル</p></div>
  <div class="card"><img src="https://via.placeholder.com/400x300"><p>作品タイトル</p></div>
</section>

<section class="cta">
  <h2>お仕事のご依頼はこちら</h2>
  <br>
  <a href="#">お問い合わせする</a>
</section>

</body>
</html>
